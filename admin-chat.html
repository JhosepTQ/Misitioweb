<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Chat en Tiempo Real</title>
    <link rel="icon" type="image/png" href="Public/img/ico13.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .admin-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        /* Sidebar de conversaciones */
        .chat-list {
            width: 350px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .chat-list-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-list-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .chat-list-header .badge {
            background: rgba(255,255,255,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .search-box {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #667eea;
        }

        .chats-container {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-item:hover {
            background: #f8f9ff;
        }

        .chat-item.active {
            background: #f0f3ff;
            border-left: 4px solid #667eea;
        }

        .chat-item.unread {
            background: #fff9e6;
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-info-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .chat-time {
            font-size: 12px;
            color: #999;
        }

        .chat-preview {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Panel de conversación */
        .conversation-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .conversation-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .conversation-header .chat-avatar {
            width: 50px;
            height: 50px;
        }

        .conversation-info h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }

        .conversation-info .status {
            font-size: 13px;
            color: #28a745;
        }

        .status.offline {
            color: #999;
        }

        .conversation-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: #e9ecef;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.client {
            flex-direction: row;
        }

        .message.admin {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.admin .message-avatar {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .message-content {
            max-width: 60%;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.client .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.admin .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            padding: 0 8px;
        }

        .message.admin .message-time {
            text-align: right;
        }

        /* Área de respuesta */
        .reply-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 20px;
        }

        .quick-replies {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .quick-reply-btn {
            padding: 8px 16px;
            background: #f0f3ff;
            color: #667eea;
            border: 1px solid #667eea;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #667eea;
            color: white;
        }

        .reply-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .reply-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 100px;
        }

        .reply-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Estado vacío */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            padding: 40px;
        }

        .empty-state i {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .chat-list {
                width: 300px;
            }

            .message-content {
                max-width: 75%;
            }
        }

        @media (max-width: 640px) {
            .admin-container {
                flex-direction: column;
            }

            .chat-list {
                width: 100%;
                max-height: 40vh;
            }

            .conversation-panel {
                display: none;
            }

            .conversation-panel.active {
                display: flex;
            }

            .chat-list.has-active {
                display: none;
            }
        }

        /* Notificación de sonido */
        .sound-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .sound-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Loading spinner */
        .loading {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Lista de Chats -->
        <div class="chat-list" id="chatList">
            <div class="chat-list-header">
                <div>
                    <h1>💬 Chats Activos</h1>
                    <div class="badge" id="chatCount">0 conversaciones</div>
                </div>
                <button class="sound-toggle" id="soundToggle" title="Activar/Desactivar sonido">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar conversaciones...">
            </div>

            <div class="chats-container" id="chatsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- Panel de Conversación -->
        <div class="conversation-panel" id="conversationPanel">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-comments"></i>
                <h3>Selecciona una conversación</h3>
                <p>Elige un chat de la lista para ver los mensajes<br>y responder en tiempo real</p>
            </div>

            <!-- Se llenará dinámicamente -->
            <div id="activeConversation" style="display: none; flex-direction: column; flex: 1;">
                <div class="conversation-header">
                    <div class="chat-avatar" id="activeAvatar">👤</div>
                    <div class="conversation-info">
                        <h2 id="activeChatName">Usuario</h2>
                        <div class="status" id="activeStatus">● En línea</div>
                    </div>
                    <div class="conversation-actions">
                        <button class="btn-icon" title="Actualizar">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button class="btn-icon" title="Información">
                            <i class="fas fa-info-circle"></i>
                        </button>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer"></div>

                <div class="reply-area">
                    <div class="quick-replies">
                        <button class="quick-reply-btn" data-text="¡Hola! 👋 ¿En qué puedo ayudarte?">
                            👋 Saludo
                        </button>
                        <button class="quick-reply-btn" data-text="Gracias por contactarnos. Te responderé en un momento.">
                            ⏱️ En un momento
                        </button>
                        <button class="quick-reply-btn" data-text="¿Tienes alguna otra pregunta?">
                            ❓ Más preguntas
                        </button>
                        <button class="quick-reply-btn" data-text="¡Perfecto! Estamos para ayudarte. 😊">
                            ✅ Perfecto
                        </button>
                    </div>

                    <div class="reply-input-container">
                        <textarea 
                            id="replyInput" 
                            class="reply-input" 
                            placeholder="Escribe tu respuesta..." 
                            rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" disabled>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio para notificaciones -->
    <audio id="notificationSound" preload="auto">
        <source src="data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAADhgCqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAYAAAAAAAADhqpuYpoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/7kGQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAEluZm8AAAAPAAAAAwAAA4YAqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqv////////////////////////////////////////////////////////////8AAAA4TEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7kGQAD/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVU=" type="audio/mpeg">
    </audio>

    <script>
        // ============================================
        // CONFIGURACIÓN DE FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyAjW7ADWDbkZCdwx7E4gQcaCD36xSYwO-w",
            authDomain: "jgwebestudio.firebaseapp.com",
            databaseURL: "https://jgwebestudio-default-rtdb.firebaseio.com",
            projectId: "jgwebestudio",
            storageBucket: "jgwebestudio.firebasestorage.app",
            messagingSenderId: "658405943934",
            appId: "1:658405943934:web:9b9eba8480ac4879cdc62f"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let activeSessionId = null;
        let soundEnabled = true;
        let chatsData = {};
        let lastMessageIds = {};

        // ============================================
        // ELEMENTOS DEL DOM
        // ============================================
        const chatList = document.getElementById('chatList');
        const chatsContainer = document.getElementById('chatsContainer');
        const chatCount = document.getElementById('chatCount');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');
        const activeConversation = document.getElementById('activeConversation');
        const messagesContainer = document.getElementById('messagesContainer');
        const replyInput = document.getElementById('replyInput');
        const sendBtn = document.getElementById('sendBtn');
        const soundToggle = document.getElementById('soundToggle');
        const notificationSound = document.getElementById('notificationSound');

        // ============================================
        // CARGAR TODAS LAS CONVERSACIONES
        // ============================================
        function loadAllChats() {
            const chatsRef = database.ref('chats');
            
            chatsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                chatsContainer.innerHTML = '';
                
                if (!data) {
                    chatsContainer.innerHTML = '<div class="empty-state"><p>No hay conversaciones aún</p></div>';
                    chatCount.textContent = '0 conversaciones';
                    return;
                }

                chatsData = data;
                const sessions = Object.keys(data);
                chatCount.textContent = `${sessions.length} conversación${sessions.length !== 1 ? 'es' : ''}`;

                // Ordenar por último mensaje
                sessions.sort((a, b) => {
                    const lastA = getLastMessageTime(data[a]);
                    const lastB = getLastMessageTime(data[b]);
                    return lastB - lastA;
                });

                sessions.forEach(sessionId => {
                    const chatData = data[sessionId];
                    renderChatItem(sessionId, chatData);
                });
            });
        }

        // ============================================
        // RENDERIZAR ITEM DE CHAT
        // ============================================
        function renderChatItem(sessionId, chatData) {
            const messages = chatData.messages ? Object.values(chatData.messages) : [];
            const lastMessage = messages[messages.length - 1];
            
            if (!lastMessage) return;

            const chatItem = document.createElement('div');
            chatItem.className = 'chat-item';
            chatItem.dataset.sessionId = sessionId;
            
            if (activeSessionId === sessionId) {
                chatItem.classList.add('active');
            }

            const initials = getInitials(sessionId);
            const timeAgo = getTimeAgo(lastMessage.timestamp);
            const preview = lastMessage.text.substring(0, 50) + (lastMessage.text.length > 50 ? '...' : '');

            chatItem.innerHTML = `
                <div class="chat-avatar">${initials}</div>
                <div class="chat-info">
                    <div class="chat-info-top">
                        <span class="chat-name">Usuario ${sessionId.substring(0, 8)}</span>
                        <span class="chat-time">${timeAgo}</span>
                    </div>
                    <div class="chat-preview">${preview}</div>
                </div>
            `;

            chatItem.addEventListener('click', () => openConversation(sessionId));
            chatsContainer.appendChild(chatItem);
        }

        // ============================================
        // ABRIR CONVERSACIÓN
        // ============================================
        function openConversation(sessionId) {
            activeSessionId = sessionId;
            
            // Actualizar UI
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-session-id="${sessionId}"]`)?.classList.add('active');

            emptyState.style.display = 'none';
            activeConversation.style.display = 'flex';

            // Actualizar header
            const initials = getInitials(sessionId);
            document.getElementById('activeAvatar').textContent = initials;
            document.getElementById('activeChatName').textContent = `Usuario ${sessionId.substring(0, 8)}`;

            // Cargar mensajes
            loadMessages(sessionId);

            // Responsive: ocultar lista en móvil
            if (window.innerWidth <= 640) {
                chatList.classList.add('has-active');
            }
        }

        // ============================================
        // CARGAR MENSAJES
        // ============================================
        function loadMessages(sessionId) {
            messagesContainer.innerHTML = '';
            const messagesRef = database.ref(`chats/${sessionId}/messages`);

            messagesRef.on('child_added', (snapshot) => {
                const messageData = snapshot.val();
                const messageId = snapshot.key;

                // Reproducir sonido solo para nuevos mensajes del cliente
                if (messageData.sender === 'client' && 
                    lastMessageIds[sessionId] !== messageId &&
                    sessionId === activeSessionId) {
                    playNotificationSound();
                }

                lastMessageIds[sessionId] = messageId;
                renderMessage(messageData);
            });
        }

        // ============================================
        // RENDERIZAR MENSAJE
        // ============================================
        function renderMessage(messageData) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${messageData.sender}`;

            const initials = messageData.sender === 'client' ? '👤' : '🎯';
            const time = formatTime(messageData.timestamp);

            messageDiv.innerHTML = `
                <div class="message-avatar">${initials}</div>
                <div class="message-content">
                    <div class="message-bubble">${messageData.text}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ============================================
        // ENVIAR RESPUESTA
        // ============================================
        async function sendReply() {
            if (!activeSessionId || !replyInput.value.trim()) return;

            const messageText = replyInput.value.trim();
            const messageData = {
                text: messageText,
                sender: 'admin',
                timestamp: Date.now()
            };

            try {
                await database.ref(`chats/${activeSessionId}/messages`).push(messageData);
                replyInput.value = '';
                sendBtn.disabled = true;
            } catch (error) {
                console.error('Error al enviar mensaje:', error);
                alert('Error al enviar el mensaje. Verifica tu configuración de Firebase.');
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        replyInput.addEventListener('input', () => {
            sendBtn.disabled = !replyInput.value.trim();
        });

        replyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendReply();
            }
        });

        sendBtn.addEventListener('click', sendReply);

        // Respuestas rápidas
        document.querySelectorAll('.quick-reply-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                replyInput.value = btn.dataset.text;
                sendBtn.disabled = false;
                replyInput.focus();
            });
        });

        // Búsqueda
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('.chat-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(searchTerm) ? 'flex' : 'none';
            });
        });

        // Toggle de sonido
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundToggle.innerHTML = soundEnabled ? 
                '<i class="fas fa-volume-up"></i>' : 
                '<i class="fas fa-volume-mute"></i>';
            soundToggle.style.opacity = soundEnabled ? '1' : '0.5';
        });

        // ============================================
        // FUNCIONES AUXILIARES
        // ============================================
        function getInitials(sessionId) {
            return '👤';
        }

        function getTimeAgo(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Ahora';
            if (minutes < 60) return `${minutes}m`;
            if (hours < 24) return `${hours}h`;
            return `${days}d`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('es-PE', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function getLastMessageTime(chatData) {
            const messages = chatData.messages ? Object.values(chatData.messages) : [];
            if (messages.length === 0) return 0;
            return messages[messages.length - 1].timestamp;
        }

        function playNotificationSound() {
            if (soundEnabled) {
                notificationSound.play().catch(e => console.log('No se pudo reproducir el sonido'));
            }
        }

        // ============================================
        // INICIALIZAR
        // ============================================
        window.addEventListener('load', () => {
            loadAllChats();
        });

        // Responsive: volver a lista en móvil
        window.addEventListener('resize', () => {
            if (window.innerWidth > 640) {
                chatList.classList.remove('has-active');
                if (activeConversation.style.display === 'flex') {
                    activeConversation.style.display = 'flex';
                }
            }
